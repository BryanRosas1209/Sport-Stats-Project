<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mercado de Fichajes - Sport Stats</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .grid-jugadores {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card-jugador {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
            text-align: center;
            transition: transform 0.2s;
        }
        .card-jugador:hover {
            transform: translateY(-5px);
        }
        .contenedor-foto {
            width: 90px;
            height: 90px;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .foto-perfil {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00bc8c;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .sin-foto {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background-color: #f0f2f5;
            color: #a0aab4;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px dashed #cbd5e1;
        }
        .nombre {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            margin: 10px 0 5px 0;
            text-transform: uppercase;
        }
        .posicion {
            font-size: 14px;
            color: #7f8c8d;
            background: #eef2f5;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .precio {
            font-size: 22px;
            font-weight: bold;
            color: #27ae60;
            margin-bottom: 15px;
        }
        .btn-añadir {
            background-color: #fff;
            color: #3498db;
            border: 2px solid #3498db;
            padding: 8px 20px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn-añadir:hover {
            background-color: #3498db;
            color: white;
        }
    </style>
</head>
<body>

    <h1>MERCADO DE FICHAJES</h1>

    <div class="grid-jugadores">
        {% for jugador in page_obj %}
            <div class="card-jugador">
                
                <div class="contenedor-foto">
                    {% if jugador.foto %}
                        <img src="{{ jugador.foto.url }}" alt="{{ jugador.nombre }}" class="foto-perfil">
                    {% else %}
                        <div class="sin-foto">N/A</div>
                    {% endif %}
                </div>

                <div class="nombre">{{ jugador.nombre }}</div>
                <div class="posicion">{{ jugador.posicion }}</div>
                <div class="precio">${{ jugador.precio }}</div>
                
                <a href="{% url 'add_to_cart' jugador.id %}" class="btn-añadir">
                    🛒 Añadir
                </a>
            </div>
        {% empty %}
            <p style="text-align: center; grid-column: 1/-1; color: #7f8c8d;">No hay jugadores registrados actualmente.</p>
        {% endfor %}
    </div>

</body>
</html>
